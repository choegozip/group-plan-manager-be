#개발 마치고 체크, 재시작 정책 설정
services:
  app:
    image: ${DOCKER_IMAGE}
    container_name: group-pm
    env_file:
      - /home/ec2-user/.env
    expose:
      - "8080"
    ports:
      - "8080:8080"
    networks:
      - group-pm-net
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL 인증서 볼륨
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/lib/letsencrypt:/var/lib/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    networks:
      - group-pm-net
    restart: unless-stopped

networks:
  group-pm-net:
    driver: bridge