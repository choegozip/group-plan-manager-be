name: Deploy via SSM with Docker Compose

on:
  push:
    branches:
      - dev

env:
  AWS_REGION: ap-northeast-2

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env from Github secrets
        run: |
          echo DOCKER_IMAGE=${{ env.DOCKER_IMAGE }} >> .env
          echo SPRING_PROFILES_ACTIVE=${{ secrets.SPRING_PROFILES_ACTIVE }} >> .env
          echo SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }} >> .env
          echo SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }} >> .env
          echo SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }} >> .env
          echo REDIS_URL=${{ secrets.REDIS_URL }} >> .env
          echo JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }} >> .env
          echo DB_URL=${{ secrets.DB_URL }} >> .env
          echo DB_USERNAME=${{ secrets.DB_USERNAME }} >> .env
          echo DB_PASSWORD=${{ secrets.DB_PASSWORD }} >> .env

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ secrets.GHCR_USERNAME }}/group-plan-manager:latest
            ghcr.io/${{ secrets.GHCR_USERNAME }}/group-plan-manager:${{ github.sha }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Copy nginx config files to EC2 via SSM
        run: |
          # nginx.conf 복사
          NGINX_CONF=$(base64 -w 0 ./nginx/nginx.conf)
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceIds,Values=${{ secrets.EC2_INSTANCE_ID }}" \
            --parameters commands=["bash","-c","echo $NGINX_CONF | base64 -d > /home/ec2-user/nginx.conf"] \
            --comment "Copy nginx.conf" \
            --timeout-seconds 60

          # default.conf 복사
          DEFAULT_CONF=$(base64 -w 0 ./nginx/default.conf)
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceIds,Values=${{ secrets.EC2_INSTANCE_ID }}" \
            --parameters commands=["bash","-c","echo $DEFAULT_CONF | base64 -d > /home/ec2-user/default.conf"] \
            --comment "Copy default.conf" \
            --timeout-seconds 60

      - name: Copy docker-compose.yml to EC2 via SSM
        run: |
          COMPOSE_CONTENT=$(base64 -w 0 ./docker-compose.yml)
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceIds,Values=${{ secrets.EC2_INSTANCE_ID }}" \
            --parameters commands=["bash","-c","echo $COMPOSE_CONTENT | base64 -d > /home/ec2-user/docker-compose.yml"] \
            --comment "Copy docker-compose.yml" \
            --timeout-seconds 60

      - name: Copy .env to EC2 via SSM
        run: |
          ENV_CONTENT=$(base64 -w 0 ./.env)
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceIds,Values=${{ secrets.EC2_INSTANCE_ID }}" \
            --parameters commands=["bash","-c","echo $ENV_CONTENT | base64 -d > /home/ec2-user/.env"] \
            --comment "Copy .env file" \
            --timeout-seconds 60

      - name: Debug environment variables
        run: |
          echo "DOCKER_IMAGE length: ${#DOCKER_IMAGE}"
          echo "DOCKER_IMAGE value: '${{ secrets.DOCKER_IMAGE }}'"
        env:
          DOCKER_IMAGE: ${{ secrets.DOCKER_IMAGE }}

      - name: Run deployment commands via SSM
        id: ssm-deploy
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceIds,Values=${{ secrets.EC2_INSTANCE_ID }}" \
            --parameters '{"commands":[
              "set -e",
              "cd /home/ec2-user",
              "docker-compose --version",
              "docker rm -f nginx || true",
              "docker-compose down || echo \"No containers to stop\"",
              "docker pull ${{ env.DOCKER_IMAGE }}",
              "docker-compose up -d",
              "sleep 10",
              "docker-compose ps",
              "docker-compose logs app",
              "docker-compose logs nginx",
              "if docker-compose ps | grep -q \"app.*Up\"; then echo \"App OK\"; else echo \"App FAIL\" && exit 1; fi",
              "if docker-compose ps | grep -q \"nginx.*Up\"; then echo \"Nginx OK\"; else echo \"Nginx FAIL\" && exit 1; fi",
              "echo \"Deployment completed at $(date)\""
            ]}' \
            --timeout-seconds 600 \
            --comment "Deploy via GitHub Actions SSM with Docker Compose - Commit: ${{ github.sha }}" \
            --query "Command.CommandId" \
            --output text)

          echo "command-id=$COMMAND_ID" >> $GITHUB_OUTPUT
          echo "SSM Command ID: $COMMAND_ID"

      - name: Wait for command completion
        run: |
          COMMAND_ID="${{ steps.ssm-deploy.outputs.command-id }}"
          echo "Waiting for command $COMMAND_ID to complete..."
          
          # 최대 10분 대기 (120 * 5초)
          for i in {1..120}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" \
              --output text 2>/dev/null || echo "InProgress")
          
            echo "[$i/120] Current status: $STATUS"
          
            case "$STATUS" in
              "Success")
                echo "✅ Deployment completed successfully!"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query "StandardOutputContent" \
                  --output text
                exit 0
                ;;
              "Failed"|"Cancelled"|"TimedOut")
                echo "❌ Deployment failed with status: $STATUS"
                echo "Error details:"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query "StandardErrorContent" \
                  --output text
                exit 1
                ;;
              "InProgress"|"Pending"|"Delayed")
                sleep 5
                ;;
              *)
                echo "Unknown status: $STATUS"
                sleep 5
                ;;
            esac
          done
          
          echo "❌ Timeout: Command did not complete within 10 minutes"
          exit 1

      - name: Cleanup on failure
        if: failure()
        run: |
          echo "🧹 Cleaning up failed deployment..."
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceIds,Values=${{ secrets.EC2_INSTANCE_ID }}" \
            --parameters 'commands=[
              "cd /home/ec2-user",
              "docker compose logs || true",
              "docker compose down || true"
            ]' \
            --comment "Cleanup failed deployment"