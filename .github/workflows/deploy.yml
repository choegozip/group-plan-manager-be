name: Deploy via SSM with Docker Compose

on:
  push:
    branches:
      - dev

env:
  AWS_REGION: ap-northeast-2
  DOCKER_IMAGE: ${{ secrets.DOCKER_IMAGE }}

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env from Github secrets
        run: |
          echo "DOCKER_IMAGE=${{ secrets.DOCKER_IMAGE }}" >> .env
          echo "SPRING_PROFILES_ACTIVE=${{ secrets.SPRING_PROFILES_ACTIVE }}" >> .env
          echo "SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}" >> .env
          echo "SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}" >> .env
          echo "SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}" >> .env
          echo "REDIS_URL=${{ secrets.REDIS_URL }}" >> .env
          echo "JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}" >> .env
          echo "GOOGLE_SERVICE_ACCOUNT=${{ secrets.GOOGLE_SERVICE_ACCOUNT }}" >> .env
          echo "GOOGLE_USER_NAME=${{ secrets.GOOGLE_USER_NAME }}" >> .env
          echo "GOOGLE_APP_PASSWORD=${{ secrets.GOOGLE_APP_PASSWORD }}" >> .env
          echo "WEBHOOK_URL=${{ secrets.WEBHOOK_URL }}" >> .env

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::647431119876:role/githubAction
          aws-region: ap-northeast-2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ secrets.GHCR_USERNAME }}/group-plan-manager:latest
            ghcr.io/${{ secrets.GHCR_USERNAME }}/group-plan-manager:${{ github.sha }}

      - name: Copy nginx config files to EC2 via SSM
        run: |
          NGINX_CONF=$(base64 -w 0 ./nginx/nginx.conf)
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceIds,Values=${{ secrets.EC2_INSTANCE_ID }}" \
            --parameters commands=["bash","-c","echo $NGINX_CONF | base64 -d | sudo tee /home/nginx.conf > /dev/null"] \
            --comment "Copy nginx.conf" \
            --timeout-seconds 60
          
          DEFAULT_CONF=$(base64 -w 0 ./nginx/default.conf)
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceIds,Values=${{ secrets.EC2_INSTANCE_ID }}" \
            --parameters commands=["bash","-c","echo $DEFAULT_CONF | base64 -d | sudo tee /home/default.conf > /dev/null"] \
            --comment "Copy default.conf" \
            --timeout-seconds 60

      - name: Copy docker-compose-prod.yml to EC2 via SSM
        run: |
          COMPOSE_CONTENT=$(base64 -w 0 ./docker-compose-prod.yml)
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceIds,Values=${{ secrets.EC2_INSTANCE_ID }}" \
            --parameters 'commands=["bash","-c","echo '"'"${COMPOSE_CONTENT}"'"' | base64 -d | sudo tee /home/docker-compose.yml > /dev/null"]' \
            --comment "Copy docker-compose.yml" \
            --timeout-seconds 60

      - name: Copy .env to EC2 via SSM
        run: |
          ENV_CONTENT=$(base64 -w 0 ./.env)
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceIds,Values=${{ secrets.EC2_INSTANCE_ID }}" \
            --parameters commands=["bash","-c","echo $ENV_CONTENT | base64 -d | sudo tee /home/.env > /dev/null"] \
            --comment "Copy .env file" \
            --timeout-seconds 60

      - name: Debug environment variables
        run: |
          echo "DOCKER_IMAGE length: ${#DOCKER_IMAGE}"
          echo "DOCKER_IMAGE value: '${{ secrets.DOCKER_IMAGE }}'"
        env:
          DOCKER_IMAGE: ${{ secrets.DOCKER_IMAGE }}

      - name: Run deployment commands via SSM
        id: ssm-deploy
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceIds,Values=${{ secrets.EC2_INSTANCE_ID }}" \
            --parameters '{"commands":[
              "set -e",
          
              "COMPOSE_DIR=/home",
              "COMPOSE_FILE=$COMPOSE_DIR/docker-compose.yml",

              "sudo docker compose -f \"$COMPOSE_FILE\" down || echo \"No containers to stop\"",
              "sudo docker compose -f \"$COMPOSE_FILE\" pull",
              "sudo docker compose -f \"$COMPOSE_FILE\" up -d",
          
              "sleep 10",
              "sudo docker compose -f \"$COMPOSE_FILE\" ps",
              "sudo docker compose -f \"$COMPOSE_FILE\" logs --tail=50 app",
              "sudo docker compose -f \"$COMPOSE_FILE\" logs --tail=50 nginx",
            
              "echo \"Deployment completed at $(date)\""
            ]}' \
            --timeout-seconds 600 \
            --comment "Deploy - ${{ github.sha }}" \
            --query "Command.CommandId" \
            --output text)
          
          echo "command-id=$COMMAND_ID" >> $GITHUB_OUTPUT
          echo "SSM Command ID: $COMMAND_ID"

      - name: Wait for command completion
        run: |
          COMMAND_ID="${{ steps.ssm-deploy.outputs.command-id }}"
          echo "Waiting for command $COMMAND_ID to complete..."
          
          # 최대 10분 대기 (120 * 5초)
          for i in {1..120}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" \
              --output text 2>/dev/null || echo "InProgress")
          
            echo "[$i/120] Current status: $STATUS"
          
            case "$STATUS" in
              "Success")
                echo "✅ Deployment completed successfully!"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query "StandardOutputContent" \
                  --output text
                exit 0
                ;;
              "Failed"|"Cancelled"|"TimedOut")
                echo "❌ Deployment failed with status: $STATUS"
                echo "Error details:"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query "StandardErrorContent" \
                  --output text
                exit 1
                ;;
              "InProgress"|"Pending"|"Delayed")
                sleep 5
                ;;
              *)
                echo "Unknown status: $STATUS"
                sleep 5
                ;;
            esac
          done
          
          echo "❌ Timeout: Command did not complete within 10 minutes"
          exit 1

      - name: Cleanup on failure
        if: failure()
        run: |
          echo "🧹 Cleaning up failed deployment..."
          
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceIds,Values=${{ secrets.EC2_INSTANCE_ID }}" \
            --parameters 'commands=[
              "set +e",
          
              "COMPOSE_DIR=/home",
              "COMPOSE_FILE=$COMPOSE_DIR/docker-compose.yml",
          
              "sudo docker compose -f \"$COMPOSE_FILE\" logs || true",
              "sudo docker compose -f \"$COMPOSE_FILE\" down || true",
              "sudo docker system prune -af --volumes || true"
            ]' \
            --comment "Cleanup failed deployment"
