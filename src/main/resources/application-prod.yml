spring:
  message:
    encoding: UTF-8
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      # 연결 풀 크기 조정 (에러 방지)
      maximum-pool-size: 20
      minimum-idle: 5

      # 적당한 생명주기
      idle-timeout: 600000    # 10분
      max-lifetime: 1800000   # 30분

      # 타임아웃 설정
      connection-timeout: 10000  #10초
      validation-timeout: 3000
      leak-detection-threshold: 30000 #30초

      # 단순한 헬스체크만
      connection-test-query: "SELECT 1"

      data-source-properties:
        # 성능 최적화
        reWriteBatchedInserts: true
        defaultRowFetchSize: 50
        # 네트워크 설정
        socketTimeout: 15000
        tcpKeepAlive: true
        # 필수 보안 설정
        ssl: true
        sslmode: require

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

        # 풀링 환경에 최적화된 배치 설정
        jdbc.batch_size: 20
        jdbc.fetch_size: 50
        order_inserts: true
        order_updates: true
        batch_versioned_data: true

        # 불필요한 쿼리 최소화
        enable_lazy_load_no_trans: false

  data:
    redis:
      url: ${REDIS_URL}
      ssl:
        enabled: true
      timeout: 1s
      lettuce:
        pool:
          max-active: 30
          max-idle: 10
          min-idle: 3
          max-wait: 2000ms
        shutdown-timeout: 100ms

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GOOGLE_USER_NAME}
    password: ${GOOGLE_APP_PASSWORD}
    properties:
      mail.smtp.auth: true #SMTP 서버가 TLS를 사용하여 안전한 연결을 요구하는 경우 true로 설정
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true
      mail.smtp.connectiontimeout: 5000 # 클라이언트가 SMTP 서버와의 연결을 설정하는데 대기해야 하는 시간
      mail.smtp.timeout: 5000 # 클라이언트가 SMTP 서버로부터 응답을 대기해야 하는 시간
      mail.smtp.writetimeout: 5000 # 클라이언트가 작업을 완료하는데 대기해야 하는 시간
  auth:
    code-expiration-millis: 1800000 # 30 * 60 * 1000 == 30분

app:
  base-url: https://goo3oo.online
  invitation-path: invite

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: INFO
    com.groupplanmanagerbe: DEBUG
    org.postgresql.core: WARN
    com.zaxxer.hikari: INFO
    com.zaxxer.hikari.pool.HikariPool: INFO

jwt:
  secret:
    key: "${JWT_SECRET_KEY}"
    whiteList:
      - /api/users/send-email
      - /api/users/verify-email
      - /api/users/signup
      - /api/auth/login
      - /api/invite
      - /actuator/health
      - /actuator/prometheus
      - /api/auth/social/*
      - /actuator/health
      - /api/auth/refresh
      
  token:
    prefix: "Bearer "
    refreshPrefix: "Refresh:"
    blackListPrefix: "BlackList:"
    expiration: 1800000
    refreshExpiration: 1209600000

firebase:
  service-account-json: ${GOOGLE_SERVICE_ACCOUNT}

slack:
  webhook-url: ${WEBHOOK_URL}