spring:
  message:
    encoding: UTF-8
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      # 연결 풀 크기 조정 (에러 방지)
      maximum-pool-size: 1
      minimum-idle: 1

      # 적당한 생명주기
      idle-timeout: 10000  # 10초
      max-lifetime: 30000  # 30초

      # 타임아웃 설정
      connection-timeout: 5000  #5초
      validation-timeout: 3000
      leak-detection-threshold: 8000

      # 단순한 헬스체크만
      connection-test-query: "SELECT 1"

      data-source-properties:
        # 성능 최적화
        reWriteBatchedInserts: true
        defaultRowFetchSize: 50
        # 네트워크 설정
        socketTimeout: 15000
        tcpKeepAlive: true
        # 필수 보안 설정
        ssl: true
        sslmode: require

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

        # 풀링 환경에 최적화된 배치 설정
        jdbc.batch_size: 20
        jdbc.fetch_size: 50
        order_inserts: true
        order_updates: true
        batch_versioned_data: true

        # 불필요한 쿼리 최소화
        enable_lazy_load_no_trans: false

  data:
    redis:
      url: ${REDIS_URL}
      ssl:
        enabled: true
      timeout: 8s
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
          max-wait: 2000ms
        shutdown-timeout: 100ms

app:
  base-url: https://goo3oo.online
  invitation-path: invite

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: INFO
    com.groupplanmanagerbe: DEBUG
    org.postgresql.core: WARN
    com.zaxxer.hikari: INFO
    com.zaxxer.hikari.pool.HikariPool: INFO

jwt:
  secret:
    key: "${JWT_SECRET_KEY}"
    whiteList:
      - /api/users/signup
      - /api/auth/login
      - /invite
      - /actuator/health
      - /actuator/prometheus
      - /api/auth/refresh
  token:
    prefix: "Bearer "
    refreshPrefix: "Refresh:"
    blackListPrefix: "BlackList:"
    expiration: 1800000
    refreshExpiration: 1209600000

firebase:
  service-account-json: ${GOOGLE_SERVICE_ACCOUNT}
