<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>이메일 인증</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 100%;
            max-width: 600px;
            margin: 50px auto;
            background-color: #ffffff;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #333333;
            margin-bottom: 6px;
            font-size: 3rem;
        }
        h2 {
            color: #6b6b6b;
            margin-top: 0;
            font-weight: normal;
        }
        p {
            color: #555555;
            line-height: 1.5;
            margin: 12px 0;
            font-size: 1.1rem;

        }
        .code-box {
            display: inline-block;
            margin-top: 18px;
            padding: 18px 26px;
            border-radius: 8px;
            background-color: #f1f7ff;
            border: 1px dashed #c7defa;
            font-family: "Courier New", Courier, monospace;
            font-size: 30px;
            font-weight: bold;
            letter-spacing: 6px;
            color: #1b4f9c;
            user-select: all; /* 이메일 클라이언트가 지원하면 복사 쉬움 */
        }
        .note {
            margin-top: 18px;
            font-size: 14px;
            color: #888888;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #888888;
        }
        /* 모바일에서 글자 크기 조금 최적화 */
        @media (max-width: 420px) {
            .code-box { font-size: 22px; padding: 14px 18px; letter-spacing: 4px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📨이메일 인증</h1>
    <br>
    <h2><b>"함께 하면 더 빠르고, 즐겁게"</b></h2>
    <br>
    <p>안녕하세요! <strong>투게두</strong>입니다 🙂🩷</p>

    <p>아래 <b>코드</b>를 인증 화면에 입력하여 이메일 인증을 완료해주세요.</p>

    <!-- 서버에서 생성하여 전달하는 코드 표시 -->
    <div class="code-box" th:text="${verificationCode}">12345</div>

    <p class="footer">이 코드는 <strong><span th:text="${expirationMinutes}"></span>분</strong> 동안 유효합니다.</p>
</div>
</body>
</html>
